<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Chat</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --border: #2d3a5c;
            --success: #4caf50;
            --warning: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--text-muted);
        }

        /* Configuration Panel */
        .config-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .config-panel h2 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* Toggle Switches */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-input);
            border-radius: 8px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--border);
            transition: .4s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* Agent Cards */
        .agents-section {
            margin-top: 30px;
        }

        .agent-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .agent-card {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .agent-card:hover {
            border-color: var(--accent);
        }

        .agent-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .agent-emoji {
            font-size: 2rem;
        }

        .agent-card-header h3 {
            flex: 1;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Personality Select */
        .personality-select {
            margin-bottom: 15px;
        }

        .personality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .personality-btn {
            padding: 12px 8px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            text-align: center;
        }

        .personality-btn:hover {
            background: var(--accent);
            color: white;
        }

        .personality-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Temperature Slider */
        .temp-slider {
            margin: 15px 0;
        }

        .temp-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* Chat Interface */
        .chat-panel {
            display: none;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: var(--bg-dark);
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 15px;
            padding: 15px;
            background: var(--bg-input);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .message.human {
            border-left-color: var(--success);
            background: rgba(76, 175, 80, 0.1);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .message.human .message-avatar {
            background: var(--success);
        }

        .message-content {
            line-height: 1.6;
            color: var(--text);
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 15px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
        }

        .status-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .status-bar.connected {
            border-color: var(--success);
            color: var(--success);
        }

        .status-bar.error {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .config-grid {
                grid-template-columns: 1fr;
            }
            
            .agent-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 <span>Multi-Agent</span> Chat</h1>
            <p>Konfiguriere deine Agenten und starte das Gespräch</p>
        </header>

        <!-- General Settings -->
        <div class="config-panel" id="configPanel">
            <h2>⚙️ Allgemeine Einstellungen</h2>
            <div class="config-grid">
                <div class="form-group">
                    <label for="topic">Gesprächsthema</label>
                    <input type="text" id="topic" placeholder="z.B. Urlaub in der DomRep" value="">
                </div>
                
                <div class="form-group">
                    <label for="rounds">Anzahl Runden</label>
                    <input type="number" id="rounds" value="3" min="1" max="20">
                </div>
                
                <div class="form-group">
                    <label class="toggle-group">
                        <div class="toggle-switch">
                            <input type="checkbox" id="includeHuman" checked>
                            <span class="slider"></span>
                        </div>
                        <span>🧑‍💻 Menschlicher Teilnehmer</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Agent Configuration -->
        <div class="config-panel">
            <div class="agents-section">
                <h2>👥 Agenten Konfiguration</h2>
                <div class="agent-cards" id="agentCards">
                    <!-- Agents will be loaded here -->
                </div>
                
                <div class="actions">
                    <button class="btn btn-secondary" onclick="addNewAgent()">
                        ➕ Agent hinzufügen
                    </button>
                    <button class="btn btn-secondary" onclick="resetToDefaults()">
                        🔄 Standard laden
                    </button>
                </div>
            </div>
        </div>

        <!-- Start Button -->
        <div class="actions" style="justify-content: center; margin-bottom: 30px;">
            <button class="btn btn-primary loading" id="startBtn" onclick="startConversation()">
                <span class="spinner"></span>
                🚀 Gespräch starten
            </button>
        </div>

        <!-- Chat Panel (hidden initially) -->
        <div class="chat-panel" id="chatPanel" style="display: none;">
            <div class="chat-header">
                <h3 id="chatTitle">💬 Gespräch</h3>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area" id="chatInputArea">
                <input type="text" id="humanInput" placeholder="Deine Nachricht..." disabled>
                <button class="btn btn-primary" onclick="sendHumanMessage()" disabled>Senden</button>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">🔄 Lade Konfiguration...</div>

    <script>
        // State
        let agents = [];
        let availableModels = [];
        let personalitites = [];
        let ws = null;
        let isRunning = false;

        // Initialize
        async function init() {
            await loadConfiguration();
        }

        // Load all config from API
        async function loadConfiguration() {
            const statusBar = document.getElementById('statusBar');
            
            try {
                // Load default agents
                const agentsRes = await fetch('/api/default-agents');
                const agentsData = await agentsRes.json();
                agents = agentsData.agents;
                
                // Load models
                const modelsRes = await fetch('/api/models');
                const modelsData = await modelsRes.json();
                availableModels = modelsData.models;
                
                // Load personalities
                const persRes = await fetch('/api/personalities');
                const persData = await persRes.json();
                personalitites = persData.personalities;
                
                // Render
                renderAgents();
                
                statusBar.textContent = '✅ Bereit';
                statusBar.className = 'status-bar connected';
            } catch (error) {
                console.error('Error loading config:', error);
                statusBar.textContent = '❌ Fehler beim Laden';
                statusBar.className = 'status-bar error';
                
                // Use hardcoded defaults
                agents = [
                    { name: 'Klaus', role: 'Techniker', instructions: '...', model: 'gemini-3-flash-preview:latest', temperature: 0.6 },
                    { name: 'Maria', role: 'Künstlerin', instructions: '...', model: 'gemini-3-flash-preview:latest', temperature: 0.8 },
                    { name: 'Isabella', role: 'Kellnerin', instructions: '...', model: 'gemini-3-flash-preview:latest', temperature: 0.9 }
                ];
                renderAgents();
            }
        }

        // Render agent cards
        function renderAgents() {
            const container = document.getElementById('agentCards');
            container.innerHTML = agents.map((agent, index) => createAgentCard(agent, index)).join('');
        }

        // Create agent card HTML
        function createAgentCard(agent, index) {
            const modelOptions = availableModels.map(m => 
                `<option value="${m.name}" ${agent.model === m.name ? 'selected' : ''}>${m.emoji} ${m.name}</option>`
            ).join('');
            
            const persButtons = personalitites.slice(0, 6).map(p => 
                `<button type="button" class="personality-btn" onclick="applyPersonality(${index}, '${p.id}')">${p.name}</button>`
            ).join('');
            
            return `
                <div class="agent-card" data-index="${index}">
                    <div class="agent-card-header">
                        <span class="agent-emoji">${getAgentEmoji(agent.name)}</span>
                        <h3>Agent ${index + 1}</h3>
                        ${index > 0 ? `<button class="remove-btn" onclick="removeAgent(${index})">×</button>` : ''}
                    </div>
                    
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name_${index}" value="${agent.name}" onchange="updateAgent(${index}, 'name', this.value)">
                    </div>
                    
                    <div class="form-group">
                        <label>Schnellauswahl</label>
                        <div class="personality-grid">
                            ${persButtons}
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Rolle</label>
                        <input type="text" id="role_${index}" value="${agent.role}" onchange="updateAgent(${index}, 'role', this.value)">
                    </div>
                    
                    <div class="form-group">
                        <label>Instructions</label>
                        <textarea id="instructions_${index}" onchange="updateAgent(${index}, 'instructions', this.value)">${agent.instructions}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Modell</label>
                        <select id="model_${index}" onchange="updateAgent(${index}, 'model', this.value)">
                            ${modelOptions}
                        </select>
                    </div>
                    
                    <div class="form-group temp-slider">
                        <label>Temperatur: <span id="tempValue_${index}">${agent.temperature}</span></label>
                        <input type="range" id="temp_${index}" min="0" max="2" step="0.1" 
                               value="${agent.temperature}" 
                               oninput="updateTemp(${index}, this.value)">
                        <div class="temp-labels">
                            <span>Präzise</span>
                            <span>Ausgewogen</span>
                            <span>Kreativ</span>
                            <span>Chaos</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Get emoji based on name
        function getAgentEmoji(name) {
            const emojis = {
                'Klaus': '🔧',
                'Maria': '🎨',
                'Isabella': '☕',
                'Oskar': '😒',
                'Sophie': '🌈',
                'Professor': '📚'
            };
            return emojis[name] || '🤖';
        }

        // Update agent property
        function updateAgent(index, field, value) {
            agents[index][field] = value;
            if (field === 'temperature') {
                document.getElementById(`tempValue_${index}`).textContent = value;
            }
        }

        // Update temperature
        function updateTemp(index, value) {
            updateAgent(index, 'temperature', parseFloat(value));
        }

        // Apply personality template
        function applyPersonality(agentIndex, persId) {
            const pers = personalitites.find(p => p.id === persId);
            if (!pers) return;
            
            // Update agent
            agents[agentIndex].role = pers.name;
            agents[agentIndex].instructions = pers.description || `${pers.name}. Antworte kurz.`;
            agents[agentIndex].temperature = pers.temperature;
            
            // Re-render
            renderAgents();
        }

        // Add new agent
        function addNewAgent() {
            const newIndex = agents.length;
            agents.push({
                name: `Agent ${newIndex + 1}`,
                role: 'Teilnehmer',
                instructions: 'Du bist ein Gesprächsteilnehmer. Antworte kurz.',
                model: availableModels[0]?.name || 'gemini-3-flash-preview:latest',
                temperature: 0.7
            });
            renderAgents();
        }

        // Remove agent
        function removeAgent(index) {
            if (agents.length > 1) {
                agents.splice(index, 1);
                renderAgents();
            }
        }

        // Reset to defaults
        async function resetToDefaults() {
            await loadConfiguration();
        }

        // Start conversation
        async function startConversation() {
            const topic = document.getElementById('topic').value;
            const rounds = parseInt(document.getElementById('rounds').value);
            const includeHuman = document.getElementById('includeHuman').checked;
            const startBtn = document.getElementById('startBtn');
            const configPanel = document.getElementById('configPanel');
            
            startBtn.classList.add('loading');
            
            try {
                // Start via API first
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic,
                        rounds,
                        agents: agents,
                        include_human: includeHuman
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'ok') {
                    // Hide config, show chat
                    configPanel.style.display = 'none';
                    startBtn.style.display = 'none';
                    
                    const chatPanel = document.getElementById('chatPanel');
                    chatPanel.style.display = 'flex';
                    document.getElementById('chatTitle').textContent = `💬 ${topic || 'Gespräch'}`;
                    
                    // Start WebSocket
                    startWebSocket(data);
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                alert('Fehler: ' + error.message);
                startBtn.classList.remove('loading');
            }
        }

        // Start WebSocket connection
        function startWebSocket(config) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/chat`);
            
            ws.onopen = () => {
                isRunning = true;
                document.getElementById('statusBar').textContent = '🟢 Verbunden';
                
                // Send start message
                ws.send(JSON.stringify({
                    type: 'start',
                    ...config
                }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                document.getElementById('statusBar').textContent = '❌ Verbindungsfehler';
                document.getElementById('statusBar').className = 'status-bar error';
            };
            
            ws.onclose = () => {
                isRunning = false;
                document.getElementById('statusBar').textContent = '🔴 Getrennt';
            };
        }

        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            const messages = document.getElementById('chatMessages');
            const inputArea = document.getElementById('chatInputArea');
            const humanInput = document.getElementById('humanInput');
            
            switch (data.type) {
                case 'system':
                    addMessage('System', data.content, true, false);
                    break;
                    
                case 'message':
                    addMessage(data.agent, data.content, false, data.is_human);
                    break;
                    
                case 'round_start':
                    addMessage('System', `--- Runde ${data.round}/${data.total_rounds} ---`, true, false);
                    break;
                    
                case 'human_turn':
                    humanInput.disabled = false;
                    humanInput.placeholder = 'Du bist dran! Tippe deine Nachricht...';
                    humanInput.focus();
                    inputArea.querySelector('button').disabled = false;
                    break;
                    
                case 'complete':
                    addMessage('System', `✅ Gespräch beendet (${data.total_messages} Nachrichten)`, true, false);
                    humanInput.disabled = true;
                    humanInput.placeholder = 'Gespräch beendet';
                    break;
                    
                case 'error':
                    addMessage('Fehler', data.message, true, false);
                    break;
            }
            
            // Scroll to bottom
            messages.scrollTop = messages.scrollHeight;
        }

        // Add message to chat
        function addMessage(agent, content, isSystem, isHuman) {
            const messages = document.getElementById('chatMessages');
            const emoji = isHuman ? '🧑‍💻' : (isSystem ? '⚙️' : getAgentEmoji(agent));
            
            const div = document.createElement('div');
            div.className = `message ${isHuman ? 'human' : ''}`;
            div.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">${emoji}</div>
                    <span>${agent}</span>
                </div>
                <div class="message-content">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Send human message
        function sendHumanMessage() {
            const input = document.getElementById('humanInput');
            const message = input.value.trim();
            
            if (!message || !ws) return;
            
            ws.send(JSON.stringify({
                type: 'human_response',
                content: message,
                agent: 'Du (Mensch)'
            }));
            
            // Add to UI
            addMessage('Du (Mensch)', message, false, true);
            
            // Clear and disable
            input.value = '';
            input.disabled = true;
            input.placeholder = 'Warte auf die Agenten...';
            document.querySelector('#chatInputArea button').disabled = true;
        }

        // Handle Enter key
        document.addEventListener('DOMContentLoaded', () => {
            init();
            
            const humanInput = document.getElementById('humanInput');
            if (humanInput) {
                humanInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        sendHumanMessage();
                    }
                });
            }
        });
    </script>
</body>
</html>
